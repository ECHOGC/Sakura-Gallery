                                        <div className="space-y-3 mt-3 animate-in fade-in pt-2 border-t border-black/10 dark:border-white/10">
                                            <div className="flex gap-2">
                                                <button onClick={() => handleChange('bgmType', 'netease_song')} className={`flex-1 py-1.5 rounded-lg border text-xs font-bold transition-all ${config.bgmType === 'netease_song' ? 'border-blue-500 bg-blue-500/10 text-blue-500' : themeClasses.border}`}>单曲</button>
                                                <button onClick={() => handleChange('bgmType', 'netease_playlist')} className={`flex-1 py-1.5 rounded-lg border text-xs font-bold transition-all ${config.bgmType === 'netease_playlist' ? 'border-blue-500 bg-blue-500/10 text-blue-500' : themeClasses.border}`}>歌单</button>
                                                <button onClick={() => handleChange('bgmType', 'audio')} className={`flex-1 py-1.5 rounded-lg border text-xs font-bold transition-all ${config.bgmType === 'audio' ? 'border-blue-500 bg-blue-500/10 text-blue-500' : themeClasses.border}`}>直链音频</button>
                                            </div>
                                            {config.bgmType.includes('netease') ? (
                                                <div className="space-y-1"><input type="text" placeholder="输入网易云 ID" value={config.bgmId || ''} onChange={(e) => handleChange('bgmId', e.target.value)} className={inputBase} /><p className="text-xs text-slate-400 opacity-80 mt-1">完美适配官方 iframe，支持侧边隐藏。</p></div>
                                            ) : (
                                                <div className="space-y-1">
                                                    <div className="flex gap-3"><input type="text" placeholder="输入 .mp3 绝对地址" value={config.bgmAudioUrl || ''} onChange={(e) => handleChange('bgmAudioUrl', e.target.value)} className={inputBase} /><label className={`px-4 py-3 rounded-xl shrink-0 font-bold cursor-pointer flex items-center justify-center transition-all ${config.theme === 'dark' ? 'bg-white/10 hover:bg-white/20' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-md'}`}>📁 本地上传<input type="file" accept="audio/*" className="hidden" onChange={(e) => handleAudioUpload(e, 'bgmAudioUrl')} /></label></div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className={`p-4 rounded-xl border flex flex-col justify-center ${config.theme === 'dark' ? 'bg-black/20 border-white/10' : 'bg-white/50 border-blue-100 shadow-sm'}`}>
                                    <div className="flex justify-between items-center mb-3"><label className="text-sm font-bold flex items-center gap-2 text-pink-400"><Icons.Sparkles /> 动态粒子引擎</label><input type="checkbox" checked={config.enableSakura} onChange={(e) => handleChange('enableSakura', e.target.checked)} className="w-5 h-5 accent-pink-500" /></div>
                                    {config.enableSakura && (
                                        <div className="space-y-3 animate-in fade-in pt-2 border-t border-black/10 dark:border-white/10">
                                            <div>
                                                <label className="block text-xs mb-2 opacity-80 font-bold">粒子外观</label>
                                                <div className="flex gap-2">
                                                    <button onClick={() => handleChange('sakuraType', 'realistic')} className={`flex-1 py-1.5 rounded-lg border text-xs font-bold transition-all ${config.sakuraType === 'realistic' ? 'border-pink-500 bg-pink-500/10 text-pink-500' : themeClasses.border}`}>逼真花瓣</button>
                                                    <button onClick={() => handleChange('sakuraType', 'simple')} className={`flex-1 py-1.5 rounded-lg border text-xs font-bold transition-all ${config.sakuraType === 'simple' ? 'border-pink-500 bg-pink-500/10 text-pink-500' : themeClasses.border}`}>简约花瓣</button>
                                                    <button onClick={() => handleChange('sakuraType', 'snow')} className={`flex-1 py-1.5 rounded-lg border text-xs font-bold transition-all ${config.sakuraType === 'snow' ? 'border-blue-500 bg-blue-500/10 text-blue-500' : themeClasses.border}`}>唯美雪花</button>
                                                </div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-xs font-bold opacity-80 mb-2"><label>飘落速度</label><span>{config.sakuraSpeed}x</span></div>
                                                <input type="range" min="0.1" max="3" step="0.1" value={config.sakuraSpeed} onChange={(e) => handleChange('sakuraSpeed', parseFloat(e.target.value))} className={`w-full h-1.5 rounded-lg appearance-none ${config.theme === 'dark' ? 'bg-white/20' : 'bg-black/10'}`} />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </section>

                        <section className="space-y-4">
                            <h3 className={`text-xl font-bold border-b pb-2 border-current border-opacity-10 ${config.theme === 'light' ? 'text-blue-500' : ''}`}>AI 视觉特征提取</h3>
                            <div className={`flex items-center gap-3 p-4 rounded-xl border ${config.theme === 'dark' ? 'bg-blue-500/10 border-blue-500/20' : 'bg-blue-50 border-blue-200'}`}>
                                <input type="checkbox" id="autoAI" checked={config.autoGenerateAI} onChange={(e) => handleChange('autoGenerateAI', e.target.checked)} className="w-5 h-5 cursor-pointer accent-blue-600" />
                                <label htmlFor="autoAI" className="cursor-pointer font-bold text-blue-500">开启上传时自动生成 AI 特征档案</label>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="md:col-span-2"><label className="block text-sm mb-1 opacity-80">Base URL</label><input type="text" value={config.apiBaseUrl} onChange={(e) => handleChange('apiBaseUrl', e.target.value)} className={inputBase} /></div>
                                <div><label className="block text-sm mb-1 opacity-80">模型 (如 gpt-4o / deepseek-chat)</label><input type="text" value={config.apiModel} onChange={(e) => handleChange('apiModel', e.target.value)} className={inputBase} /></div>
                                <div><label className="block text-sm mb-1 opacity-80">API Key</label><input type="password" value={config.apiKey} onChange={(e) => handleChange('apiKey', e.target.value)} className={inputBase} /></div>
                            </div>
                            <button onClick={testApiConnection} className={`px-4 py-2 border rounded-lg transition-colors text-sm font-bold ${config.theme === 'dark' ? 'bg-slate-800 border-white/20 hover:bg-slate-700 text-white' : 'bg-white border-blue-200 hover:bg-blue-50 text-blue-600 shadow-sm'}`}>🧪 连通性测试</button>
                        </section>

                        <section className="space-y-4">
                            <h3 className={`text-xl font-bold border-b pb-2 border-current border-opacity-10 ${config.theme === 'light' ? 'text-blue-500' : ''}`}>安全与隐私</h3>
                            <div><label className="block text-sm mb-1 opacity-80">隐私空间 PIN 密码 (留空则不设密码)</label><input type="password" value={config.privacyPin || ''} onChange={(e) => handleChange('privacyPin', e.target.value)} className={inputBase} /></div>
                        </section>

                        <section className="space-y-4">
                            <h3 className={`text-xl font-bold border-b pb-2 border-current border-opacity-10 ${config.theme === 'light' ? 'text-blue-500' : ''}`}>环境与 UI</h3>
                            <div>
                                <label className="block text-sm mb-2 opacity-80 font-bold">色彩主题</label>
                                <div className="flex gap-4">
                                    <button onClick={() => handleChange('theme', 'dark')} className={`flex-1 py-3 rounded-xl border transition-all ${config.theme === 'dark' ? 'border-blue-500 bg-blue-500/10 text-blue-500 font-bold' : themeClasses.border}`}>🌙 深空暗黑</button>
                                    <button onClick={() => handleChange('theme', 'light')} className={`flex-1 py-3 rounded-xl border transition-all ${config.theme === 'light' ? 'border-blue-500 bg-blue-500/10 text-blue-600 font-bold shadow-md' : themeClasses.border}`}>☀️ 清新明亮</button>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm mb-2 opacity-80 font-bold">全局背景壁纸</label>
                                <div className="flex gap-3">
                                    <input type="text" value={config.bgImage} onChange={(e) => handleChange('bgImage', e.target.value)} className={inputBase} />
                                    <button onClick={() => setShowBgPicker(true)} className={`px-4 py-3 rounded-xl shrink-0 font-bold ${config.theme === 'dark' ? 'bg-white/10 hover:bg-white/20' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-md'}`}>图库直选</button>
                                </div>
                            </div>
                            <div className="flex gap-6 pt-4">
                                <div className="flex-1"><label className="block text-sm mb-2 opacity-80 font-bold">遮罩暗度 ({Math.round(config.bgOpacity*100)}%)</label><input type="range" min="0" max="1" step="0.05" value={config.bgOpacity} onChange={(e) => handleChange('bgOpacity', parseFloat(e.target.value))} className={`w-full h-2 rounded-lg appearance-none ${config.theme === 'dark' ? 'bg-white/20' : 'bg-black/10'}`} /></div>
                                <div className="flex-1"><label className="block text-sm mb-2 opacity-80 font-bold">毛玻璃模糊 ({config.blurLevel}px)</label><input type="range" min="0" max="100" step="1" value={config.blurLevel} onChange={(e) => handleChange('blurLevel', parseInt(e.target.value))} className={`w-full h-2 rounded-lg appearance-none ${config.theme === 'dark' ? 'bg-white/20' : 'bg-black/10'}`} /></div>
                            </div>
                        </section>
                    </div>

                    {showBgPicker && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-12 animate-in fade-in">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setShowBgPicker(false)}></div>
                            <div className={`relative w-full max-w-5xl h-3/4 flex flex-col rounded-2xl shadow-2xl overflow-hidden ${config.theme === 'dark' ? 'bg-slate-900 border-white/10' : 'bg-white border-black/10'}`}>
                                <div className="p-4 border-b border-white/10 flex justify-between items-center"><h3 className="font-bold text-lg">挑选背景图片</h3><button onClick={() => setShowBgPicker(false)}><Icons.Close /></button></div>
                                <div className="p-4 overflow-y-auto grid grid-cols-3 md:grid-cols-5 gap-3">
                                    {allPhotos.filter(p => !parseMetadata(p.analysis).mimeType?.startsWith('video/')).map(photo => (
                                        <div key={photo.id} onClick={() => { handleChange('bgImage', photo.url); setShowBgPicker(false); }} className="aspect-square bg-slate-800 rounded-lg overflow-hidden cursor-pointer hover:ring-4 hover:ring-blue-500 shadow-md"><img src={photo.url} className="w-full h-full object-cover" /></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 主程序入口
        // ==========================================
        function App() {
          const [config, setConfig] = useState(() => { 
              const saved = localStorage.getItem('nas_gallery_config'); 
              const parsed = saved ? { ...DEFAULT_CONFIG, ...JSON.parse(saved) } : DEFAULT_CONFIG; 
              if (parsed.bgmType === 'netease') parsed.bgmType = 'netease_playlist';
              if (parsed.sakuraSpeed === undefined) parsed.sakuraSpeed = 1.0;
              if (parsed.sakuraType === undefined) parsed.sakuraType = 'realistic';
              if (parsed.vaultName === undefined) parsed.vaultName = '至尊收藏室';
              if (parsed.vaultColor === undefined) parsed.vaultColor = '#ef4444';
              if (parsed.vaultSound === undefined) parsed.vaultSound = 'https://cdn.pixabay.com/audio/2022/03/15/audio_c8b8f7eb3e.mp3';
              if (parsed.vaultOpenSound === undefined) parsed.vaultOpenSound = 'https://cdn.pixabay.com/audio/2024/09/09/audio_24da2d10ae.mp3';
              return parsed;
          });
          const [currentRoute, setCurrentRoute] = useState('all'); 
          const [sidebarOpen, setSidebarOpen] = useState(true);
          const [allPhotos, setAllPhotos] = useState([]);
          const [selectedPhoto, setSelectedPhoto] = useState(null);
          const [isUploading, setIsUploading] = useState(false);
          const [albumModalOpen, setAlbumModalOpen] = useState(false);
          const [newAlbumName, setNewAlbumName] = useState("");
          const [searchQuery, setSearchQuery] = useState("");
          const [sortBy, setSortBy] = useState("upload_desc"); 
          const [isSelectionMode, setIsSelectionMode] = useState(false);
          const [selectedIds, setSelectedIds] = useState([]);
          const [privacyUnlocked, setPrivacyUnlocked] = useState(false);
          const [showBatchAlbumMenu, setShowBatchAlbumMenu] = useState(false);
          
          const [toasts, setToasts] = useState([]);
          const addToast = useCallback((msg, type = 'success') => {
              const id = Date.now() + Math.random();
              setToasts(prev => [...prev, { id, msg, type }]);
              setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
          }, []);

          useEffect(() => { localStorage.setItem('nas_gallery_config', JSON.stringify(config)); }, [config]);

          const loadCloudPhotos = async () => { try { setAllPhotos(await dbAPI.getAllPhotos()); } catch (err) { console.error("Error", err); } };
          useEffect(() => { loadCloudPhotos(); }, []);
          useEffect(() => { if (searchQuery.trim().length > 0 && currentRoute !== 'all') setCurrentRoute('all'); }, [searchQuery]);
          
          useEffect(() => { if (!isSelectionMode) setShowBatchAlbumMenu(false); }, [isSelectionMode]);

          // 数据操作函数
          const handleTrash = async (idsToTrash) => {
              const promises = idsToTrash.map(async (id) => {
                  const photo = allPhotos.find(p => p.id === id);
                  const meta = parseMetadata(photo.analysis); meta.deletedAt = Date.now();
                  return dbAPI.updatePhoto(id, { analysis: JSON.stringify(meta), analyzing: photo.analyzing });
              });
              await Promise.all(promises); await loadCloudPhotos();
              setSelectedIds([]); setIsSelectionMode(false); setSelectedPhoto(null);
              addToast(`已将 ${idsToTrash.length} 张图片移至回收站`);
          };

          const handleRestore = async (idsToRestore) => {
              const promises = idsToRestore.map(async (id) => {
                  const photo = allPhotos.find(p => p.id === id);
                  const meta = parseMetadata(photo.analysis); meta.deletedAt = null; 
                  return dbAPI.updatePhoto(id, { analysis: JSON.stringify(meta), analyzing: photo.analyzing });
              });
              await Promise.all(promises); await loadCloudPhotos();
              setSelectedIds([]); setIsSelectionMode(false);
              addToast(`成功恢复 ${idsToRestore.length} 张图片`);
          };

          const handlePermanentDelete = async (idsToDelete) => {
              if (!confirm(`🚨 危险！彻底擦除硬盘里的这 ${idsToDelete.length} 个文件？`)) return;
              try {
                  const promises = idsToDelete.map(id => dbAPI.deletePhoto(id));
                  await Promise.all(promises);
                  setAllPhotos(prev => prev.filter(p => !idsToDelete.includes(p.id)));
                  setSelectedIds([]); setIsSelectionMode(false); setSelectedPhoto(null);
                  addToast(`彻底删除了 ${idsToDelete.length} 个文件`);
              } catch (e) { alert("删除失败: " + e.message); }
          };

          const handleTogglePrivacy = async (idsToToggle) => {
              const promises = idsToToggle.map(async (id) => {
                  const photo = allPhotos.find(p => p.id === id);
                  const meta = parseMetadata(photo.analysis); meta.isPrivate = !meta.isPrivate;
                  return dbAPI.updatePhoto(id, { analysis: JSON.stringify(meta), analyzing: photo.analyzing });
              });
              await Promise.all(promises); await loadCloudPhotos();
              setSelectedIds([]); setIsSelectionMode(false); setSelectedPhoto(null);
          };

          const handleUpdateMetaField = async (photo, field, value) => {
              const meta = parseMetadata(photo.analysis);
              let newAnalyzing = photo.analyzing; 
              if (field === 'isFavorite') meta.isFavorite = !meta.isFavorite;
              if (field === 'inVault') { meta.inVault = !meta.inVault; addToast(meta.inVault ? `已收入 ${config.vaultName}` : `已移出 ${config.vaultName}`); }
              if (field === 'albums') { if (meta.albums.includes(value)) meta.albums = meta.albums.filter(v => v !== value); else meta.albums.push(value); }
              if (field === 'text') { meta.text = value; newAnalyzing = false; }
              if (field === 'location') { meta.manualLat = value.lat; meta.manualLng = value.lng; }
              const newAnalysis = JSON.stringify(meta);
              setAllPhotos(prev => prev.map(p => p.id === photo.id ? { ...p, analysis: newAnalysis, analyzing: newAnalyzing } : p));
              setSelectedPhoto(prev => prev && prev.id === photo.id ? { ...photo, analysis: newAnalysis, analyzing: newAnalyzing } : prev);
              try { await dbAPI.updatePhoto(photo.id, { analysis: newAnalysis, analyzing: newAnalyzing }); } catch (e) {}
          };

          const handleToggleVaultBatch = async (ids) => {
              const promises = ids.map(async (id) => {
                  const photo = allPhotos.find(p => p.id === id);
                  const meta = parseMetadata(photo.analysis); meta.inVault = !meta.inVault;
                  return dbAPI.updatePhoto(id, { analysis: JSON.stringify(meta), analyzing: photo.analyzing });
              });
              await Promise.all(promises); await loadCloudPhotos();
              setSelectedIds([]); setIsSelectionMode(false); addToast(`批量收藏室状态已切换`);
          };

          const handleBatchAddToAlbum = async (albumId) => {
              setShowBatchAlbumMenu(false);
              const promises = selectedIds.map(async (id) => {
                  const photo = allPhotos.find(p => p.id === id);
                  const meta = parseMetadata(photo.analysis);
                  if (!meta.albums.includes(albumId)) {
                      meta.albums.push(albumId);
                      return dbAPI.updatePhoto(id, { analysis: JSON.stringify(meta), analyzing: photo.analyzing });
                  }
                  return Promise.resolve();
              });
              await Promise.all(promises); await loadCloudPhotos();
              setSelectedIds([]); setIsSelectionMode(false); addToast(`成功将 ${selectedIds.length} 项移入文件夹`);
          };

          const handleFileUpload = async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            setIsUploading(true);
            
            // 为了防止密集报错，即使不保留数据库坐标了，依然生成占位符
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const isVideo = file.type.startsWith('video/');
                let exifData = null;
                if (!isVideo && !file.type.includes('gif')) { 
                    try {
                        const exifRaw = await exifr.parse(file, true);
                        if (exifRaw) exifData = { make: exifRaw.Make, model: exifRaw.Model, lens: exifRaw.LensModel, fNumber: exifRaw.FNumber, exposureTime: exifRaw.ExposureTime, iso: exifRaw.ISO, dateTimeOriginal: exifRaw.DateTimeOriginal ? new Date(exifRaw.DateTimeOriginal).getTime() : null, latitude: exifRaw.latitude, longitude: exifRaw.longitude };
                    } catch(e) {}
                }
                const reader = new FileReader();
                reader.onloadend = async () => {
                  try {
                    const rawBase64 = reader.result;
                    const pureBase64Data = rawBase64.split(',')[1];
                    const newId = Date.now().toString() + Math.floor(Math.random()*1000);
                    const initialAnalysisData = { 
                        text: isVideo ? "视频/动图不提供视觉分析" : (config.autoGenerateAI ? "AI 引擎正在深度解析图像档案..." : "未开启自动分析，请放大图片手动生成。"), 
                        mimeType: file.type, exif: exifData, isFavorite: false, inVault: false, albums: [], deletedAt: null, isPrivate: currentRoute === 'private',
                        manualLat: null, manualLng: null
                    };
                    
                    // 传入空值即可，现在我们改为纯动态算法渲染墙体坐标了
                    const newPhotoData = {
                      id: newId, url: rawBase64, x: 0, y: 0, z: 0, rotZ: 0, width: 0, height: 0,
                      analysis: JSON.stringify(initialAnalysisData), analyzing: (!isVideo && config.autoGenerateAI), timestamp: Date.now()
                    };
                    
                    const savedPhoto = await dbAPI.addPhoto(newPhotoData);
                    setAllPhotos(prev => [savedPhoto, ...prev]);

                    if (!isVideo && config.autoGenerateAI && config.apiKey) {
                       try {
                         const aiBase64Data = await new Promise((resolve) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                let w = img.width, h = img.height; const maxDim = 1024; 
                                if (w > maxDim || h > maxDim) { if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; } else { w = Math.round(w * maxDim / h); h = maxDim; } }
                                canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                                resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                            };
                            img.onerror = () => resolve(pureBase64Data); img.src = rawBase64;
                         });
                         const payload = { model: config.apiModel, messages: [{ role: "user", content: [{ type: "text", text: getProfessionalPrompt() }, { type: "image_url", image_url: { url: `data:image/jpeg;base64,${aiBase64Data}` } }] }] };
                         const baseUrl = config.apiBaseUrl.replace(/\/+$/, '');
                         const res = await fetch(`${baseUrl}/chat/completions`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKey}` }, body: JSON.stringify(payload) });
                         const data = await res.json();
                         if (data.choices && data.choices[0]) initialAnalysisData.text = data.choices[0].message.content; else throw new Error("API异常");
                       } catch (err) { initialAnalysisData.text = "AI 解析中断，请手动生成。"; }
                       setAllPhotos(prev => prev.map(p => p.id === newId ? { ...p, analysis: JSON.stringify(initialAnalysisData), analyzing: false } : p));
                       try { await dbAPI.updatePhoto(newId, { analysis: JSON.stringify(initialAnalysisData), analyzing: false }); } catch (e) {}
                       addToast("AI 视觉分析已生成");
                    }
                  } catch (error) {}
                };
                reader.readAsDataURL(file);
            }
            setIsUploading(false);
          };

          const handleCreateAlbum = () => {
              if(!newAlbumName.trim()) return;
              const newAlbum = { id: 'album_' + Date.now(), name: newAlbumName, viewType: 'grid' };
              setConfig(prev => ({ ...prev, albums: [...prev.albums, newAlbum] }));
              setNewAlbumName(""); setAlbumModalOpen(false); setCurrentRoute(newAlbum.id);
              addToast(`文件夹 "${newAlbumName}" 创建成功`);
          };

          const currentAlbumConfig = config.albums.find(a => a.id === currentRoute);
          const currentViewType = currentRoute === 'map' ? 'map' : (currentRoute === 'vault' ? 'vault' : (currentAlbumConfig ? currentAlbumConfig.viewType : (currentRoute === 'settings' ? null : 'grid')));

          const filteredPhotos = useMemo(() => {
              let list = [...allPhotos];
              const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;
              list = list.filter(p => {
                  const meta = parseMetadata(p.analysis);
                  if (meta.deletedAt && (Date.now() - meta.deletedAt > THIRTY_DAYS)) return false;
                  return true;
              });

              list.sort((a, b) => {
                  const ta = parseMetadata(a.analysis).exif?.dateTimeOriginal || a.timestamp;
                  const tb = parseMetadata(b.analysis).exif?.dateTimeOriginal || b.timestamp;
                  if (sortBy === 'capture_desc') return tb - ta;
                  if (sortBy === 'upload_asc') return a.timestamp - b.timestamp;
                  return b.timestamp - a.timestamp; 
              });

              if (searchQuery.trim()) {
                  const queryTerms = searchQuery.toLowerCase().split(/\s+/).filter(Boolean);
                  return list.filter(p => {
                      const meta = parseMetadata(p.analysis);
                      if (meta.deletedAt || meta.isPrivate) return false;
                      const d = new Date(p.timestamp).toLocaleDateString();
                      const ed = meta.exif?.dateTimeOriginal ? new Date(meta.exif.dateTimeOriginal).toLocaleDateString() : '';
                      const albumNames = meta.albums.map(id => config.albums.find(a => a.id === id)?.name || "").join(" ").toLowerCase();
                      const searchableText = [ meta.text, d, ed, albumNames, meta.exif?.make, meta.exif?.model, meta.exif?.lens ].filter(Boolean).join(" ").toLowerCase();
                      return queryTerms.every(term => searchableText.includes(term));
                  });
              }

              if(currentRoute === 'trash') return list.filter(p => parseMetadata(p.analysis).deletedAt);
              if(currentRoute === 'private') return list.filter(p => parseMetadata(p.analysis).isPrivate && !parseMetadata(p.analysis).deletedAt);

              const normalList = list.filter(p => !parseMetadata(p.analysis).deletedAt && !parseMetadata(p.analysis).isPrivate);
              
              if(currentRoute === 'vault') return normalList.filter(p => parseMetadata(p.analysis).inVault);
              if(currentRoute === 'all') return normalList;
              if(currentRoute === 'map') return normalList.filter(p => parseMetadata(p.analysis).manualLat || parseMetadata(p.analysis).exif?.latitude); 
              if(currentRoute === 'favorites') return normalList.filter(p => parseMetadata(p.analysis).isFavorite);
              if(currentRoute === 'videos') return normalList.filter(p => parseMetadata(p.analysis).mimeType?.startsWith('video/'));
              if(currentRoute === 'images') return normalList.filter(p => !parseMetadata(p.analysis).mimeType?.startsWith('video/'));
              
              if(currentRoute.startsWith('smart_')) {
                  const type = currentRoute.replace('smart_', '');
                  const keywords = SMART_ALBUMS[type].keywords;
                  return normalList.filter(p => keywords.some(k => parseMetadata(p.analysis).text.toLowerCase().includes(k)));
              }
              return normalList.filter(p => parseMetadata(p.analysis).albums.includes(currentRoute));
          }, [allPhotos, currentRoute, sortBy, searchQuery, config.albums]);

          const handleNavigatePhoto = (direction) => {
              if(!selectedPhoto || filteredPhotos.length === 0) return;
              const currentIndex = filteredPhotos.findIndex(p => p.id === selectedPhoto.id);
              let newIndex = currentIndex + direction;
              if (newIndex < 0) newIndex = filteredPhotos.length - 1;
              if (newIndex >= filteredPhotos.length) newIndex = 0;
              setSelectedPhoto(filteredPhotos[newIndex]);
          };

          const themeClasses = {
              text: config.theme === 'dark' ? 'text-slate-100' : 'text-slate-900',
              textMuted: config.theme === 'dark' ? 'text-slate-400' : 'text-slate-500',
              bgSidebar: config.theme === 'dark' ? 'bg-slate-900/90 border-white/10' : 'bg-white/90 border-black/10 shadow-xl',
              bgHover: config.theme === 'dark' ? 'hover:bg-white/10' : 'hover:bg-black/5',
              bgActive: config.theme === 'dark' ? 'bg-blue-600/20 text-blue-400' : 'bg-blue-100 text-blue-700',
              border: config.theme === 'dark' ? 'border-white/10' : 'border-black/10',
              overlay: config.theme === 'dark' ? `rgba(10, 15, 30, ${config.bgOpacity})` : `rgba(255, 255, 255, ${config.bgOpacity})`,
          };

          if (currentRoute === 'private' && config.privacyPin && !privacyUnlocked) {
              return (
                  <div className={`w-full h-screen flex flex-col items-center justify-center ${config.theme === 'dark' ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-800'}`}>
                      <Icons.Lock />
                      <h2 className="text-xl font-bold mt-4 mb-6">隐私空间已锁定</h2>
                      <input type="password" placeholder="输入 PIN 码回车" className={`px-4 py-2 rounded-lg outline-none border text-center tracking-widest ${config.theme === 'dark' ? 'bg-slate-800 border-white/20' : 'bg-white border-black/20 shadow-sm'}`} onKeyDown={(e) => { if (e.key === 'Enter') { if(e.target.value === config.privacyPin) setPrivacyUnlocked(true); else { alert('密码错误'); e.target.value = ''; } } }} />
                      <button onClick={() => setCurrentRoute('all')} className="mt-6 text-sm text-blue-500 font-medium hover:underline">返回主页</button>
                  </div>
              )
          }

          const getRouteTitle = () => {
              if(searchQuery.trim()) return `搜索结果`;
              if(currentRoute === 'all') return "时间线图库";
              if(currentRoute === 'map') return "世界足迹";
              if(currentRoute === 'vault') return config.vaultName;
              if(currentRoute === 'trash') return "回收站 (30天过期)";
              if(currentRoute === 'private') return "隐私空间";
              if(currentRoute === 'settings') return "控制台";
              if(currentRoute.startsWith('smart_')) return SMART_ALBUMS[currentRoute.replace('smart_', '')].name;
              return currentAlbumConfig ? currentAlbumConfig.name : (currentRoute === 'favorites' ? '我的收藏' : '图库');
          };

          return (
            <div className={`flex h-screen w-full font-sans transition-colors duration-500 ${themeClasses.text}`}>
              {currentRoute !== 'vault' && (
                  <>
                      <div className="fixed inset-0 -z-20 bg-cover bg-center transition-all duration-700" style={{ backgroundImage: `url(${config.bgImage})` }}></div>
                      <div className="fixed inset-0 -z-10 transition-all duration-500" style={{ backgroundColor: themeClasses.overlay, backdropFilter: `blur(${config.blurLevel}px)` }}></div>
                  </>
              )}
              {currentRoute === 'vault' && <div className="fixed inset-0 -z-10 bg-slate-950 transition-colors duration-1000"></div>}

              <div className="fixed top-20 right-6 z-[9999] flex flex-col gap-3 pointer-events-none">
                  {toasts.map(t => (
                      <div key={t.id} className={`flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl backdrop-blur-xl animate-in slide-in-from-right-8 pointer-events-auto transition-all ${config.theme === 'dark' ? 'bg-slate-800/90 border border-white/10 text-white' : 'bg-white/90 border border-black/10 text-slate-800'}`}>
                          <div className={t.type === 'success' ? 'text-green-500' : 'text-blue-500'}><Icons.CheckCircle /></div>
                          <span className="text-sm font-bold tracking-wide">{t.msg}</span>
                      </div>
                  ))}
              </div>

              {config.enableSakura && <SakuraEffect config={config} />}

              <div className={`shrink-0 transition-all duration-300 ease-in-out ${sidebarOpen ? 'w-64' : 'w-0'} overflow-y-auto border-r ${themeClasses.bgSidebar} backdrop-blur-2xl z-20 hide-scroll`}>
                  <aside className="w-64 min-h-full flex flex-col pb-10">
                      <div className={`h-16 flex items-center px-6 font-bold text-lg tracking-wide border-b ${themeClasses.border}`}>
                          <div className={`w-7 h-7 mr-3 flex items-center justify-center shadow-lg shrink-0 ${config.appIconShape === 'rounded-full' ? 'rounded-full' : 'rounded-lg'} ${config.appIconType === 'text' ? 'bg-blue-600 text-white text-sm' : 'overflow-hidden border border-black/10'}`}>
                              {config.appIconType === 'text' ? config.appIconText : <img src={config.appIconImage} className="w-full h-full object-cover bg-white" alt="logo" />}
                          </div> 
                          Sakura+
                      </div>
                      <div className="flex-1 py-4 px-3 space-y-6">
                          <div>
                              <div className="space-y-1">
                                  <button onClick={() => setCurrentRoute('all')} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all text-sm font-medium ${currentRoute === 'all' ? themeClasses.bgActive : themeClasses.bgHover}`}><Icons.Photos /> 图库 (全部)</button>
                                  <button onClick={() => setCurrentRoute('map')} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all text-sm font-medium ${currentRoute === 'map' ? themeClasses.bgActive : themeClasses.bgHover}`}><Icons.Map /> 世界足迹</button>
                                  <button onClick={() => setCurrentRoute('favorites')} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all text-sm font-medium ${currentRoute === 'favorites' ? themeClasses.bgActive : themeClasses.bgHover}`}><Icons.Heart /> 我的收藏</button>
                                  <button onClick={() => setCurrentRoute('videos')} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all text-sm font-medium ${currentRoute === 'videos' ? themeClasses.bgActive : themeClasses.bgHover}`}><Icons.Video /> 视频录像</button>
                              </div>
                          </div>
                          <div>
                              <div className={`px-3 mb-2 flex items-center gap-1 text-xs font-bold uppercase tracking-widest ${themeClasses.textMuted}`}><Icons.Sparkles /> 智能分类</div>
                              <div className="space-y-1">
                                  {Object.keys(SMART_ALBUMS).map(key => (
                                      <button key={key} onClick={() => setCurrentRoute('smart_'+key)} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all text-sm font-medium ${currentRoute === 'smart_'+key ? themeClasses.bgActive : themeClasses.bgHover}`}><span className="text-base leading-none">{SMART_ALBUMS[key].icon}</span> {SMART_ALBUMS[key].name}</button>
                                  ))}
                              </div>
                          </div>
                          <div>
                              <div className={`px-3 mb-2 flex items-center justify-between text-xs font-bold uppercase tracking-widest ${themeClasses.textMuted}`}><span>典藏与至尊</span></div>
                              <div className="space-y-1">
                                  <button onClick={() => setCurrentRoute('vault')} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all text-sm font-bold ${currentRoute === 'vault' ? 'bg-gradient-to-r from-slate-900 to-black border border-white/10 text-[var(--vault-color)] shadow-[0_0_15px_var(--vault-color)]' : 'hover:bg-slate-900 hover:text-white'}`} style={{'--vault-color': config.vaultColor}}>
                                      <Icons.Diamond /> {config.vaultName}
                                  </button>
                              </div>
                          </div>
                          <div>
                              <div className={`px-3 mb-2 flex items-center justify-between text-xs font-bold uppercase tracking-widest ${themeClasses.textMuted}`}><span>我的文件夹</span><button onClick={() => setAlbumModalOpen(true)} className={`hover:text-blue-500 transition-colors ${config.theme === 'light' ? 'text-slate-400' : ''}`}><Icons.FolderPlus /></button></div>
                              <div className="space-y-1">
                                  {config.albums.map(album => (
                                      <button key={album.id} onClick={() => setCurrentRoute(album.id)} className={`w-full flex items-center justify-between px-3 py-2 rounded-lg transition-all text-sm font-medium ${currentRoute === album.id ? themeClasses.bgActive : themeClasses.bgHover}`}>
                                          <div className="flex items-center gap-3 truncate"><Icons.Folder /> <span className="truncate">{album.name}</span></div>{album.viewType === '3d' ? <Icons.Wall3D/> : <Icons.GridIcon/>}
                                      </button>
                                  ))}
                              </div>
                          </div>
                          <div>
                              <div className={`px-3 mb-2 text-xs font-bold uppercase tracking-widest ${themeClasses.textMuted}`}>空间与安全</div>
                              <div className="space-y-1">
                                  <button onClick={() => { setCurrentRoute('private'); if(!config.privacyPin) setPrivacyUnlocked(true); }} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all text-sm font-medium ${currentRoute === 'private' ? themeClasses.bgActive : themeClasses.bgHover}`}><Icons.Lock /> 隐私空间</button>
                                  <button onClick={() => setCurrentRoute('trash')} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-all text-sm font-medium ${currentRoute === 'trash' ? themeClasses.bgActive : themeClasses.bgHover}`}><Icons.Trash /> 最近删除</button>
                              </div>
                          </div>
                      </div>
                      <div className={`p-3 border-t ${themeClasses.border}`}>
                          <button onClick={() => setCurrentRoute('settings')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm font-medium ${currentRoute === 'settings' ? themeClasses.bgActive : themeClasses.bgHover}`}><Icons.Settings /> 系统控制台</button>
                      </div>
                  </aside>
              </div>

              <main className="flex-1 flex flex-col relative h-screen overflow-hidden">
                  <header className={`h-16 shrink-0 flex items-center justify-between px-4 md:px-6 border-b ${currentRoute==='vault' ? 'border-white/5 bg-slate-950/80 text-white' : themeClasses.border + ' ' + (config.theme === 'dark' ? 'bg-black/20' : 'bg-white/60')} backdrop-blur-md z-10`}>
                      <div className="flex items-center gap-4 flex-1">
                          <button onClick={() => setSidebarOpen(!sidebarOpen)} className={`p-2 rounded-lg transition-colors ${currentRoute==='vault' ? 'hover:bg-white/10' : themeClasses.bgHover}`}><Icons.Menu /></button>
                          <h2 className="text-xl font-bold flex items-center gap-3 whitespace-nowrap hidden sm:flex" style={{color: currentRoute==='vault'?config.vaultColor:undefined, textShadow: currentRoute==='vault'?`0 0 10px ${config.vaultColor}`:'none'}}>
                              {currentRoute === 'vault' && <Icons.Diamond />} {getRouteTitle()}
                              {currentAlbumConfig && (
                                  <div className={`flex items-center rounded-lg p-0.5 ml-2 ${config.theme === 'dark' ? 'bg-black/30' : 'bg-black/5'}`}>
                                      <button onClick={() => setConfig({...config, albums: config.albums.map(a => a.id===currentRoute?{...a,viewType:'grid'}:a)})} className={`p-1 rounded ${currentViewType==='grid' ? (config.theme==='dark'?'bg-white/20':'bg-white shadow-sm') : 'opacity-50'}`}><Icons.GridIcon/></button>
                                      <button onClick={() => setConfig({...config, albums: config.albums.map(a => a.id===currentRoute?{...a,viewType:'3d'}:a)})} className={`p-1 rounded ${currentViewType==='3d' ? (config.theme==='dark'?'bg-white/20':'bg-white shadow-sm') : 'opacity-50'}`}><Icons.Wall3D/></button>
                                  </div>
                              )}
                          </h2>
                          {currentRoute !== 'settings' && currentRoute !== 'vault' && (
                              <div className="relative ml-4 max-w-sm flex-1">
                                  <div className={`absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none opacity-50 ${config.theme === 'light' ? 'text-black' : 'text-white'}`}><Icons.Search /></div>
                                  <input type="text" placeholder="多维搜索..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className={`w-full pl-10 pr-4 py-2 rounded-full outline-none text-sm font-medium border transition-all ${config.theme==='dark'?'bg-black/30 border-white/10 focus:border-white/30 text-white':'bg-white/50 border-black/10 focus:border-blue-300 text-black shadow-inner'}`} />
                              </div>
                          )}
                      </div>

                      <div className="flex items-center gap-3 shrink-0 ml-4">
                          {currentRoute !== 'settings' && currentRoute !== 'trash' && currentRoute !== 'map' && (
                              <>
                                  <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className={`text-sm px-2 py-2 rounded-lg outline-none cursor-pointer appearance-none bg-transparent font-medium ${currentRoute === 'vault' ? 'text-white hover:bg-white/10' : themeClasses.bgHover}`}>
                                      <option className="text-black" value="upload_desc">⬇️ 上传最新</option><option className="text-black" value="upload_asc">⬆️ 上传最早</option><option className="text-black" value="capture_desc">📸 拍摄最新</option>
                                  </select>
                                  
                                  <button onClick={() => {
                                      if (isSelectionMode) setSelectedIds([]);
                                      setIsSelectionMode(!isSelectionMode);
                                  }} className={`px-4 py-2 text-sm font-bold rounded-lg border ${isSelectionMode ? 'bg-blue-600 border-blue-500 text-white shadow-md' : (currentRoute === 'vault' ? 'border-white/20 hover:bg-white/10' : themeClasses.border + ' ' + themeClasses.bgHover)}`}>
                                      {isSelectionMode ? '取消选择' : '批量操作'}
                                  </button>
                              </>
                          )}
                          {currentRoute === 'trash' && (
                              <button onClick={() => {
                                  if (isSelectionMode) setSelectedIds([]);
                                  setIsSelectionMode(!isSelectionMode);
                              }} className={`px-4 py-2 text-sm font-bold rounded-lg border ${isSelectionMode ? 'bg-blue-600 border-blue-500 text-white shadow-md' : themeClasses.border + ' ' + themeClasses.bgHover}`}>
                                  {isSelectionMode ? '取消选择' : '选择文件'}
                              </button>
                          )}
                          {currentRoute !== 'settings' && currentRoute !== 'vault' && (
                              <label className={`flex items-center gap-2 px-4 py-2 rounded-lg cursor-pointer transition-all text-sm font-bold shadow-md active:scale-95 ${config.theme === 'dark' ? 'bg-blue-600 hover:bg-blue-500 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}`}>
                                  {isUploading ? <div className="animate-spin rounded-full h-4 w-4 border-2 border-t-transparent border-white"></div> : <Icons.Upload />}<span className="hidden sm:inline">上传</span>
                                  <input type="file" accept="image/*,video/*,.gif" multiple className="hidden" onChange={handleFileUpload} disabled={isUploading} />
                              </label>
                          )}
                      </div>
                  </header>

                  <div className={`flex-1 relative w-full h-full ${currentRoute === 'vault' ? 'bg-transparent' : (config.theme === 'dark' ? 'bg-black/20' : 'bg-white/30')}`}>
                      {currentRoute === 'settings' ? <SettingsView config={config} setConfig={setConfig} themeClasses={themeClasses} allPhotos={allPhotos} addToast={addToast} />
                          : currentViewType === 'map' ? <MapView photos={filteredPhotos} onSelect={setSelectedPhoto} config={config} />
                          : currentViewType === 'vault' ? <VaultView photos={filteredPhotos} onSelect={setSelectedPhoto} isSelectionMode={isSelectionMode} selectedIds={selectedIds} setSelectedIds={setSelectedIds} config={config} />
                          : currentViewType === '3d' ? <Wall3DView photos={filteredPhotos} onSelect={setSelectedPhoto} config={config} />
                          : <GridView photos={filteredPhotos} onSelect={setSelectedPhoto} themeClasses={themeClasses} isSelectionMode={isSelectionMode} selectedIds={selectedIds} setSelectedIds={setSelectedIds} currentRoute={currentRoute} config={config} />}
                  </div>

                  {isSelectionMode && selectedIds.length > 0 && (
                      <div className={`absolute bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl shadow-2xl border flex items-center gap-6 z-50 ${currentRoute === 'vault' || config.theme === 'dark' ? 'bg-slate-900 text-white border-white/20' : 'bg-white text-slate-800 border-black/10'}`}>
                          <span className="font-bold">{selectedIds.length} 项已选</span><div className={`w-px h-5 ${currentRoute === 'vault' || config.theme === 'dark' ? 'bg-white/20' : 'bg-black/10'}`}></div>
                          {currentRoute === 'trash' ? (
                              <><button onClick={() => handleRestore(selectedIds)} className="text-green-500 hover:text-green-400 font-medium flex gap-2 transition-colors"><Icons.TrashRestore/> 恢复</button>
                                 <button onClick={() => handlePermanentDelete(selectedIds)} className="text-red-500 hover:text-red-400 font-medium flex gap-2 transition-colors"><Icons.Trash/> 彻底销毁</button></>
                          ) : (
                              <>
                                 <div className="relative">
                                     <button onClick={() => setShowBatchAlbumMenu(!showBatchAlbumMenu)} className="hover:text-blue-500 flex items-center gap-2 font-medium transition-colors">
                                         <Icons.FolderPlus/> 移入...
                                     </button>
                                     {showBatchAlbumMenu && (
                                         <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-4 w-48 bg-slate-800 border border-white/20 rounded-xl shadow-2xl py-2 z-50 animate-in slide-in-from-bottom-2">
                                             <div className="px-3 pb-2 mb-2 border-b border-white/10 text-xs text-white/50 font-bold uppercase">选择目标文件夹</div>
                                             {config.albums.map(album => (
                                                 <button key={album.id} onClick={() => handleBatchAddToAlbum(album.id)} className="w-full text-left px-4 py-2 text-sm text-white hover:bg-blue-600 flex items-center justify-between transition-colors">
                                                     <span className="truncate">{album.name}</span>
                                                 </button>
                                             ))}
                                         </div>
                                     )}
                                 </div>
                                 <button onClick={() => handleToggleVaultBatch(selectedIds)} className="hover:text-amber-500 flex gap-2 font-medium transition-colors"><Icons.Diamond/> 典藏</button>
                                 <button onClick={() => handleTogglePrivacy(selectedIds)} className="hover:text-blue-500 flex gap-2 font-medium transition-colors"><Icons.Lock/> 加密</button>
                                 <button onClick={() => handleTrash(selectedIds)} className="text-red-500 hover:text-red-400 font-medium flex gap-2 transition-colors"><Icons.Trash/> 删除</button>
                              </>
                          )}
                      </div>
                  )}
              </main>

              <BGMEngine config={config} />

              {albumModalOpen && (
                  <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setAlbumModalOpen(false)}></div>
                      <div className={`relative w-full max-w-sm p-6 rounded-2xl shadow-2xl ${config.theme === 'dark' ? 'bg-slate-800' : 'bg-white'}`}>
                          <h3 className="text-xl font-bold mb-4">新建文件夹</h3>
                          <input type="text" autoFocus value={newAlbumName} onChange={e => setNewAlbumName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleCreateAlbum()} className={`w-full px-4 py-2 rounded-lg border mb-4 outline-none ${config.theme === 'dark' ? 'bg-slate-900 border-white/20' : 'bg-slate-50 border-black/20'}`} />
                          <div className="flex justify-end gap-2">
                              <button onClick={() => setAlbumModalOpen(false)} className="px-4 py-2 rounded-lg font-medium opacity-70 hover:bg-black/10">取消</button>
                              <button onClick={handleCreateAlbum} className="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">创建</button>
                          </div>
                      </div>
                  </div>
              )}

              {selectedPhoto && (
                  <PhotoDetailModal photo={selectedPhoto} onClose={() => setSelectedPhoto(null)} themeClasses={themeClasses}
                      onToggleFavorite={() => handleUpdateMetaField(selectedPhoto, 'isFavorite')}
                      onToggleVault={() => handleUpdateMetaField(selectedPhoto, 'inVault')}
                      onTrash={() => { handleTrash([selectedPhoto.id]); setSelectedPhoto(null); }}
                      onDelete={() => { handlePermanentDelete([selectedPhoto.id]); setSelectedPhoto(null); }}
                      onToggleAlbum={(albumId) => handleUpdateMetaField(selectedPhoto, 'albums', albumId)}
                      onUpdateText={(text) => handleUpdateMetaField(selectedPhoto, 'text', text)}
                      onUpdateLocation={(latlng) => handleUpdateMetaField(selectedPhoto, 'location', latlng)}
                      onNavigate={handleNavigatePhoto} config={config} currentRoute={currentRoute} addToast={addToast}
                  />
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
