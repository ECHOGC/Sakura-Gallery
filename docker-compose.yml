version: '3.8'

services:
  # 核心数据库引擎
  db:
    image: mysql:8.0
    container_name: sakura_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: nas_gallery
    ports:
      - "${DB_PORT}:3306"
    volumes:
      # 挂载本地目录以持久化保存数据，防止容器重启数据丢失
      - ./db_data:/var/lib/mysql
      # 首次启动时自动执行建表脚本
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Node.js 后端服务引擎
  api:
    image: node:20-alpine
    container_name: sakura_api
    restart: always
    working_dir: /app
    volumes:
      # 将后端的代码挂载进去
      - ./backend:/app
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=nas_gallery
      - PORT=${API_PORT}
    # 启动时自动安装依赖并运行
    command: sh -c "npm install && node server.js"
    depends_on:
      - db
